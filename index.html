<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="icon" href="./Images/Icon.ico">
    <link rel="stylesheet" href="styles.css">
    <style>@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');</style>
</head>
<body>
    <section>
        <div class="sign-up">
            <div class="heading">
                Welcome
            </div>
            <form action="/login" method="POST">
                <div class="details">
                    <input type="text" placeholder="Email Address" id="email" name="email">
                </div>
                <div>
                    <input type="password" id="pass" name="password" placeholder="Password">
                </div>
                <a href="#" class="forgot-password">Forgot Password?</a>
                <div>
                    <button class="login-button" type="submit">Login</button>
                </div>
            </form>
            <p class="no-account">Don't have an account?<a href="#" class="sign_up_button">  SignUp</a></p>
        </div>
    </section>
    <script src="app.js"></script>
</body>
</html>
